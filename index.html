<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1, initial-scale=1.0">
  <title>Trello Timeline</title>
  <style>
    :root {
      --bg-start: #f4efe6;
      --bg-end: #dbe9f6;
      --panel: #ffffff;
      --text: #182230;
      --muted: #55657a;
      --accent: #007ea7;
      --accent-hover: #00688a;
      --border: #d8e1ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 10%, #ffffff 0%, transparent 45%),
                  linear-gradient(145deg, var(--bg-start), var(--bg-end));
      padding: 24px;
    }

    .app-shell {
      max-width: 940px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(19, 44, 73, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
    }

    #trelloForm {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    #board {
      flex: 1;
      min-width: 230px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fbfdff;
      color: var(--text);
    }

    button[type="submit"] {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .timeline-card {
      background: #f9fbfd;
      border: 1px solid var(--border);
      border-left: 5px solid #32a287;
      border-radius: 12px;
      padding: 12px;
    }

    .timeline-card h3 {
      margin: 8px 0;
      font-size: 1.05rem;
    }

    .timeline-card p {
      margin: 0;
      color: #3c4c60;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    #summarizeBtn {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      margin-top: 12px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .app-shell {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <h1>Trello Timeline</h1>
    <p class="subtitle">Choisis un board puis genere un resume visuel des cartes.</p>

    <form id="trelloForm">
      <select name="trello-boards" id="board"></select>
      <button type="submit">Afficher les missions</button>
    </form>

    <div class="timeline" id="timeline"></div>

  <div>
    <button type="submit" id="summarizeBtn"> Résumer le board</button>
  </div>

  </main>
  <script src="script.js"></script>
</body>
</html>
